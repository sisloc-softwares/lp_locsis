<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico de Maturidade da sua Locadora — Locsis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0C0C1A;
      --bg2: #121228;
      --bg3: #181830;
      --green: #00E87A;
      --green-d: rgba(0,232,122,0.10);
      --green-b: rgba(0,232,122,0.32);
      --purple: #7B4FFF;
      --purple-d: rgba(123,79,255,0.12);
      --purple-b: rgba(123,79,255,0.35);
      --white: #F0F0F8;
      --w60: rgba(240,240,248,0.60);
      --w20: rgba(240,240,248,0.20);
      --w08: rgba(240,240,248,0.08);
      --red: #FF4444;
      --orange: #FF8C00;
      --yellow: #FFD700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: var(--bg); }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .screen {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 20px 40px;
      animation: fadeSlideIn 0.32s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-cta {
      background: var(--green);
      color: #000;
      font-family: inherit;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.5px;
      padding: 18px 24px;
      border-radius: 50px;
      width: 100%;
      border: none;
      cursor: pointer;
      min-height: 56px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,232,122,0.22);
    }
    .btn-cta:hover { opacity: 0.94; box-shadow: 0 6px 28px rgba(0,232,122,0.32); }
    .btn-cta:active { transform: scale(0.98); }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1.5px solid var(--w20);
      border-radius: 12px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--green-b); }
    .form-input.error { border-color: var(--red); }
    .form-input::placeholder { color: var(--w60); }

    .answer-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 64px;
      border-radius: 14px;
      border: 1.5px solid transparent;
      padding: 16px 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
      text-align: left;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
      background: transparent;
      color: var(--white);
    }
    .answer-btn:active { transform: scale(0.98); }
    .answer-btn.red    { background: rgba(255,68,68,0.10); border-color: rgba(255,68,68,0.32); }
    .answer-btn.yellow { background: rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.28); }
    .answer-btn.green  { background: var(--green-d);       border-color: var(--green-b); }
    .answer-btn.red:hover    { background: rgba(255,68,68,0.16); }
    .answer-btn.yellow:hover { background: rgba(255,215,0,0.14); }
    .answer-btn.green:hover  { background: rgba(0,232,122,0.18); }
    .answer-btn.dim { opacity: 0.35; pointer-events: none; }
    .answer-btn.selected { border-width: 2px; }
    .answer-btn.selected.red    { background: rgba(255,68,68,0.22); border-color: #FF4444; }
    .answer-btn.selected.yellow { background: rgba(255,215,0,0.18); border-color: #FFD700; }
    .answer-btn.selected.green  { background: rgba(0,232,122,0.22); border-color: var(--green); }
    .answer-btn:disabled { cursor: default; }
    .answer-btn:disabled:active { transform: none; }

    @keyframes slideDown {
      from { opacity: 0; max-height: 0; transform: translateY(-10px); }
      to   { opacity: 1; max-height: 2200px; transform: translateY(0); }
    }
    .rec-appear { animation: slideDown 0.4s ease forwards; overflow: hidden; }

    @keyframes badgePop {
      0%   { opacity: 0; transform: scale(0.8); }
      60%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    .badge-pop { animation: badgePop 0.32s ease forwards; }

    .toggle-btn {
      flex: 1;
      min-height: 50px;
      border-radius: 12px;
      border: 1.5px solid var(--w20);
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: var(--w60);
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active    { background: var(--green-d); border-color: var(--green-b); color: var(--green); }
    .toggle-btn.active-no { background: rgba(255,68,68,0.10); border-color: rgba(255,68,68,0.32); color: var(--red); }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%           { transform: scale(1);   opacity: 1; }
    }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--green); animation: dot-pulse 1.4s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .check-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--green-d);
      border: 1.5px solid var(--green-b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--green);
      margin-top: 1px;
      font-weight: 700;
    }

    .gap-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid var(--w08);
    }
    .gap-item:last-child { border-bottom: none; }

    .module-badge {
      background: var(--w08);
      border: 1px solid var(--w20);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    a { color: inherit; text-decoration: none; }
  </style>
</head>

    function getFaixa(score) {
      if (score <= 5)  return { label: 'INFORMAL',        color: '#FF4444', phrase: 'Sua locadora opera no improviso. Os riscos são altos e o crescimento está travado. Mas a boa notícia: cada passo que você der agora faz diferença imediata.' };
      if (score <= 10) return { label: 'EM ESTRUTURAÇÃO', color: '#FF8C00', phrase: 'Você já deu alguns passos importantes, mas ainda tem gaps que custam dinheiro. Fechar essas lacunas vai destravar o crescimento.' };
      if (score <= 15) return { label: 'ORGANIZADA',      color: '#FFD700', phrase: 'Sua base está boa. O próximo nível é integrar e automatizar para ganhar escala sem aumentar a complexidade.' };
      return                  { label: 'PROFISSIONAL',    color: '#00E87A', phrase: 'Sua locadora está bem organizada. Você está à frente da maioria. O próximo passo é otimizar com tecnologia para escalar com eficiência.' };
    }

    function getDimensionStatus(percent) {
      if (percent < 40) return { label: 'Crítico', color: 'var(--red)' };
      if (percent < 70) return { label: 'Atenção', color: 'var(--orange)' };
      return { label: 'Forte', color: 'var(--green)' };
    }

    /* ── HELPERS ───────────────────────────────────────────────────────── */

    function maskPhone(v) {
      const d = v.replace(/\D/g, '').slice(0, 11);
      if (d.length === 0) return '';
      if (d.length <= 2)  return `(${d}`;
      if (d.length <= 7)  return `(${d.slice(0,2)}) ${d.slice(2)}`;
      return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
    }

    function validateForm(data) {

      }, []);

      const schedule = (callback, delay) => {
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          timerRef.current = null;
          callback();
        }, delay);

      const handleAnswer = (value) => {
        if (selected !== null) return;

    function GaugeSVG({ score }) {
      const [displayScore, setDisplayScore] = useState(0);

      useEffect(() => {
        const t = setTimeout(() => setDisplayScore(score), 200);
        return () => clearTimeout(t);
      }, [score]);

      const faixa = getFaixa(score);
      const cx = 130;
      const cy = 124;
      const radius = 96;
      const arcLength = Math.PI * radius;
      const progress = Math.max(0, Math.min(displayScore / 20, 1));
      const dashOffset = arcLength * (1 - progress);

      const pointOnGauge = (value, pointRadius = radius) => {
        const theta = Math.PI * (1 - value / 20);
        return {
          x: cx + Math.cos(theta) * pointRadius,
          y: cy - Math.sin(theta) * pointRadius,
        };
      };

      const marker = pointOnGauge(displayScore);
      const ticks = [0, 5, 10, 15, 20];

      return (
        <div style={{ background:'linear-gradient(180deg, rgba(240,240,248,0.06), rgba(240,240,248,0.025))', border:'1px solid var(--w08)', borderRadius:18, padding:'18px 18px 16px', boxShadow:'0 16px 44px rgba(0,0,0,0.18)' }}>
          <div style={{ position:'relative', maxWidth:360, height:180, margin:'0 auto' }}>
            <svg
              viewBox="0 0 260 154"
              role="img"
              aria-label={`Pontuação ${score} de 20. Faixa ${faixa.label}.`}
              style={{ width:'100%', display:'block', overflow:'visible' }}
            >
              <defs>
                <linearGradient id="gaugeProgress" x1="34" y1="0" x2="226" y2="0" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stopColor="#FF4444" />
                  <stop offset="43%" stopColor="#FF8C00" />
                  <stop offset="70%" stopColor="#FFD700" />
                  <stop offset="100%" stopColor="#00E87A" />
                </linearGradient>
                <filter id="gaugeMarkerShadow" x="-80%" y="-80%" width="260%" height="260%">
                  <feDropShadow dx="0" dy="3" stdDeviation="3" floodColor="#000000" floodOpacity="0.36" />
                </filter>
              </defs>

              <path d="M 34 124 A 96 96 0 0 1 226 124" fill="none" stroke="rgba(240,240,248,0.09)" strokeWidth="22" strokeLinecap="round" />
              <path
                d="M 34 124 A 96 96 0 0 1 226 124"
                fill="none"
                stroke="url(#gaugeProgress)"
                strokeWidth="18"
                strokeLinecap="round"
                strokeDasharray={arcLength}
                strokeDashoffset={dashOffset}
                style={{ transition:'stroke-dashoffset 1.4s cubic-bezier(0.25, 1, 0.5, 1)' }}
              />

              {ticks.map(value => {
                const inner = pointOnGauge(value, value === 0 || value === 20 ? 78 : 82);
                const outer = pointOnGauge(value, 92);
                return (
                  <line
                    key={value}
                    x1={inner.x}
                    y1={inner.y}
                    x2={outer.x}
                    y2={outer.y}
                    stroke="rgba(240,240,248,0.24)"
                    strokeWidth={value === 0 || value === 10 || value === 20 ? 2 : 1.5}
                    strokeLinecap="round"
                  />
                );
              })}

              {displayScore > 0 && (
                <g filter="url(#gaugeMarkerShadow)" style={{ transition:'transform 1.4s cubic-bezier(0.25, 1, 0.5, 1)' }}>
                  <circle cx={marker.x} cy={marker.y} r="9" fill="var(--bg)" stroke={faixa.color} strokeWidth="4" />
                  <circle cx={marker.x} cy={marker.y} r="3.5" fill="#FFFFFF" />
                </g>
              )}

              <text x="34" y="145" fill="rgba(240,240,248,0.52)" fontSize="11" fontWeight="800">0</text>
              <text x="226" y="145" textAnchor="end" fill="rgba(240,240,248,0.52)" fontSize="11" fontWeight="800">20</text>
            </svg>

            <div style={{ position:'absolute', left:0, right:0, top:66, textAlign:'center', pointerEvents:'none' }}>
              <p style={{ color:'var(--w60)', fontSize:11, fontWeight:800, letterSpacing:1.2, textTransform:'uppercase', marginBottom:8 }}>Pontuação</p>
              <div style={{ fontSize:54, fontWeight:900, lineHeight:1, letterSpacing:0 }}>
                {score}<span style={{ fontSize:28, color:'var(--w60)', fontWeight:700 }}>/20</span>
              </div>
            </div>
          </div>

          <div style={{ display:'flex', justifyContent:'center', marginTop:2 }}>
            <div style={{ display:'inline-flex', alignItems:'center', gap:8, background:'rgba(240,240,248,0.055)', border:'1px solid rgba(240,240,248,0.12)', borderRadius:999, padding:'8px 14px' }}>
              <span style={{ width:8, height:8, borderRadius:'50%', background:faixa.color, boxShadow:`0 0 16px ${faixa.color}` }} />
              <span style={{ fontSize:12, fontWeight:900, color:faixa.color, letterSpacing:1.3, textTransform:'uppercase' }}>{faixa.label}</span>
            </div>
          </div>
        </div>
      );
    }

            {modules.map(m => (
              <div key={m} className="module-badge">{m}</div>
            ))}
          </div>

          <div style={{ width:'100%' }}>
            <a className="btn-cta" style={{ fontSize:16 }} href="https://locsis.com" target="_blank" rel="noopener noreferrer">
              TESTE GRÁTIS POR 15 DIAS →
            </a>
            <p style={{ color:'var(--w60)', fontSize:13, marginTop:10 }}>Sem cartão de crédito. Sem compromisso.</p>
          </div>

          <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'center' }}>
            {['100% ONLINE', 'FÁCIL DE USAR', 'PLANOS QUE CABEM NO SEU BOLSO'].map(b => (
              <div key={b} style={{ background:'var(--w08)', borderRadius:20, padding:'5px 12px', fontSize:11, fontWeight:700, color:'var(--w60)', letterSpacing:0.5 }}>{b}</div>
            ))}
          </div>

          <div style={{ marginTop:8, padding:'22px 20px', background:'var(--bg3)', borderRadius:16, border:'1px solid var(--w08)', width:'100%' }}>
            <p style={{ fontSize:13, color:'var(--w60)', lineHeight:1.6 }}>
              Junte-se às locadoras que já saíram do improviso. O Locsis foi criado por quem conhece o dia a dia de quem loca — feito para simplificar, não complicar.
            </p>
          </div>
        </div>
      );
    }

    /* ── APP ───────────────────────────────────────────────────────────── */

    function App() {
      const [state, setState] = useState({
        step: 'intro',
        formData: { name:'', email:'', whatsapp:'' },
        currentQuestion: 0,
        answers: [],
        totalScore: 0,
      });

      const go = (updates) => {
        window.scrollTo(0, 0);
        setState(prev => ({ ...prev, ...updates }));
      };

      const handleFormSubmit = (formData) => go({ step:'quiz', formData });

      const handleNext = (value) => {
        const newAnswers = [...state.answers, value];
        const isLast = state.currentQuestion === 9;
        if (isLast) {
          go({ answers: newAnswers, totalScore: newAnswers.reduce((s, v) => s + v, 0), step: 'loading' });
        } else {
          go({ answers: newAnswers, currentQuestion: state.currentQuestion + 1 });
        }
      };

      const goBack = () => {
        window.scrollTo(0, 0);
        switch (state.step) {
          case 'form':
            setState(prev => ({ ...prev, step: 'intro' }));
            break;
          case 'quiz':
            if (state.currentQuestion === 0) {
              setState(prev => ({ ...prev, step: 'form' }));
            } else {
              setState(prev => ({
                ...prev,
                currentQuestion: prev.currentQuestion - 1,
                answers: prev.answers.slice(0, -1),
              }));
            }
            break;
          case 'result':
            setState(prev => ({
              ...prev,
              step: 'quiz',
              currentQuestion: 9,
              answers: prev.answers.slice(0, 9),
            }));
            break;
          case 'cta':
            setState(prev => ({ ...prev, step: 'result' }));
            break;
        }
      };

      const render = () => {
        switch (state.step) {
          case 'intro':
            return <IntroScreen key="intro" onStart={() => go({ step:'form' })} />;
          case 'form':
            return <FormScreen key="form" onSubmit={handleFormSubmit} onBack={goBack} />;
          case 'quiz':
            return <QuizScreen key={`q${state.currentQuestion}`} questionIndex={state.currentQuestion} onNext={handleNext} onBack={goBack} />;
          case 'loading':
            return <LoadingScreen key="loading" onDone={() => go({ step:'result' })} />;
          case 'result':
            return <ResultScreen key="result" score={state.totalScore} answers={state.answers} onCTA={() => go({ step:'cta' })} onBack={goBack} />;
          case 'cta':
            return <CTAScreen key="cta" onBack={goBack} />;
          default:
            return null;
        }
      };

      return <div>{render()}</div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
